<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容归档 | AI Nexus</title>
    <meta name="description" content="过往每日更新的内容存档">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- 动态背景 -->
    <div class="ambient-bg spring-fluid-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
        <div class="dots-grid"></div>
        <div class="petal" style="left: 20%; animation-delay: 0s;"></div>
        <div class="petal" style="left: 50%; animation-delay: 5s;"></div>
        <div class="petal" style="left: 85%; animation-delay: 10s;"></div>
    </div>

    <!-- 跳过导航 -->
    <a href="#main-content" class="skip-link">跳到主要内容</a>

    <!-- 阅读进度条 -->
    <div class="reading-progress" id="reading-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

    <!-- 导航 -->
    <nav class="glass-nav" role="navigation" aria-label="主导航">
        <div class="nav-container">
            <a href="index.html" class="logo" aria-label="AI Nexus首页">
                <span class="logo-icon" aria-hidden="true">◈</span>
                <span class="logo-text">AI Nexus</span>
            </a>
            <div class="nav-links" id="nav-links" role="menubar">
                <a href="index.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◉</span>首页
                </a>
                <a href="papers.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◈</span>论文精选
                </a>
                <a href="news.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◇</span>产业资讯
                </a>
                <a href="archive.html" class="nav-link active" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">○</span>内容归档
                </a>
            </div>
            <div class="nav-actions" style="margin-left:auto;display:flex;align-items:center;gap:10px;">
                <button class="theme-toggle" id="theme-toggle" aria-label="切换暗色/亮色模式" title="切换主题">
                    <i class="fas fa-adjust"></i>
                </button>
                <button class="reading-mode-toggle" id="reading-mode-toggle" aria-label="切换阅读模式" title="纸张阅读模式">
                    <i class="fas fa-book-open"></i>
                </button>
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="打开菜单" aria-expanded="false" style="display:none;">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container" id="main-content">
        <div class="page-header">
            <div class="hero-badge">
                <span class="pulse-dot"></span>
                每日归档 · 知识沉淀
            </div>
            <h1><span class="spring-gradient-text">内容归档</span></h1>
            <p>过往每日更新的内容存档</p>
            <!-- 学习统计 -->
            <div class="stats-ring-grid" id="stats-dashboard">
                <div class="ring-stat-card" data-target="papers">
                    <div class="ring-container">
                        <svg class="ring-svg" viewBox="0 0 80 80">
                            <defs>
                                <linearGradient id="ring-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#22d3ee"/>
                                    <stop offset="100%" stop-color="#6366f1"/>
                                </linearGradient>
                            </defs>
                            <circle class="ring-bg" cx="40" cy="40" r="35"/>
                            <circle class="ring-progress" cx="40" cy="40" r="35" style="stroke-dashoffset: 55;"/>
                        </svg>
                        <div class="ring-center"><i class="fas fa-book" style="color:var(--primary-light);"></i></div>
                    </div>
                    <div class="stat-value" id="total-papers" style="font-size:1.5rem;">0</div>
                    <div class="stat-label">论文阅读</div>
                </div>
                <div class="ring-stat-card" data-target="streak">
                    <div class="ring-container">
                        <svg class="ring-svg" viewBox="0 0 80 80">
                            <circle class="ring-bg" cx="40" cy="40" r="35"/>
                            <circle class="ring-progress" cx="40" cy="40" r="35" style="stroke-dashoffset: 88;"/>
                        </svg>
                        <div class="ring-center"><i class="fas fa-fire" style="color:#f59e0b;"></i></div>
                    </div>
                    <div class="stat-value" id="streak-days" style="font-size:1.5rem;">3</div>
                    <div class="stat-label">连续学习</div>
                </div>
                <div class="ring-stat-card" data-target="insights">
                    <div class="ring-container">
                        <svg class="ring-svg" viewBox="0 0 80 80">
                            <circle class="ring-bg" cx="40" cy="40" r="35"/>
                            <circle class="ring-progress" cx="40" cy="40" r="35" style="stroke-dashoffset: 33;"/>
                        </svg>
                        <div class="ring-center"><i class="fas fa-lightbulb" style="color:#a78bfa;"></i></div>
                    </div>
                    <div class="stat-value" id="total-insights" style="font-size:1.5rem;">42</div>
                    <div class="stat-label">获得洞见</div>
                </div>
            </div>
        </div>

        <section class="archive-section spring-glass-card">
            <div class="archive-grid" id="archive-list">
                <!-- 动态加载 -->
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo-icon">◈</span>
                <span>AI Nexus</span>
            </div>
            <p class="footer-tagline">由 QClaw AI 驱动 · 每日自动更新</p>
            <p class="copyright">© 2026 AI Nexus · Built with QClaw</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('archive-list');

            let archiveItems = [];

            if (typeof siteData !== 'undefined' && siteData.archive && siteData.archive.length > 0) {
                archiveItems = siteData.archive;
            }

            if (archiveItems.length > 0) {
                container.innerHTML = archiveItems.map((item, idx) => `
                    <div class="archive-card hover-shadow-lift reveal" style="animation-delay:${idx * 0.08}s">
                        <div class="archive-date">${item.date}</div>
                        <h3>${item.title || '每日精选'}</h3>
                        <div class="archive-stats">
                            <span>📄 ${item.papers || 0} 篇论文</span>
                            <span>📰 ${item.news || 0} 条资讯</span>
                        </div>
                    </div>
                `).join('');
            } else {
                const today = new Date().toLocaleDateString('zh-CN', {
                    year: 'numeric', month: '2-digit', day: '2-digit'
                });
                const paperCount = typeof siteData !== 'undefined'
                    ? Object.values(siteData.papers).reduce((s, a) => s + a.length, 0)
                    : 0;
                const newsCount = typeof siteData !== 'undefined' ? siteData.news.length : 0;

                container.innerHTML = `
                    <div class="archive-card hover-shadow-lift reveal">
                        <div class="archive-date">${today}</div>
                        <h3>今日精选内容</h3>
                        <div class="archive-stats">
                            <span>📄 ${paperCount} 篇论文</span>
                            <span>📰 ${newsCount} 条资讯</span>
                        </div>
                    </div>
                    <div class="empty-state" style="grid-column:1/-1;padding:40px 20px;">
                        <div class="icon">📚</div>
                        <p>历史存档将在每日更新后自动积累</p>
                        <p style="font-size:0.85rem;margin-top:8px;color:var(--text-muted)">每日更新后会自动归档</p>
                    </div>
                `;
            }

            // 阅读进度条
            const progressBar = document.getElementById('reading-progress');
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                progressBar.style.width = (docHeight > 0 ? (scrollTop / docHeight) * 100 : 0) + '%';
            });

            // 暗色/亮色模式切换
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const isDark = !document.body.classList.contains('light-theme');
                    document.body.classList.toggle('light-theme');
                    themeToggle.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                    localStorage.setItem('theme', isDark ? 'light' : 'dark');
                });
                if (localStorage.getItem('theme') === 'light') {
                    document.body.classList.add('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
            }

            // 阅读模式切换
            const readingModeToggle = document.getElementById('reading-mode-toggle');
            if (readingModeToggle) {
                readingModeToggle.addEventListener('click', () => {
                    const isReading = document.body.classList.toggle('reading-mode');
                    readingModeToggle.style.background = isReading ? 'rgba(99,102,241,0.2)' : '';
                    readingModeToggle.style.borderColor = isReading ? 'rgba(99,102,241,0.4)' : '';
                    localStorage.setItem('readingMode', isReading ? 'on' : 'off');
                });
                if (localStorage.getItem('readingMode') === 'on') {
                    document.body.classList.add('reading-mode');
                    readingModeToggle.style.background = 'rgba(99,102,241,0.2)';
                    readingModeToggle.style.borderColor = 'rgba(99,102,241,0.4)';
                }
            }

            // 移动端菜单
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.getElementById('nav-links');
            if (mobileMenuBtn && navLinks) {
                mobileMenuBtn.addEventListener('click', () => {
                    const isOpen = navLinks.classList.toggle('open');
                    mobileMenuBtn.setAttribute('aria-expanded', String(isOpen));
                    mobileMenuBtn.innerHTML = isOpen ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
                });
            }

            // 滚动动画
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('stagger-in'); e.target.classList.add('visible'); observer.unobserve(e.target); } });
            }, { threshold: 0.1 });
            document.querySelectorAll('.archive-card').forEach(el => observer.observe(el));

            // 粒子系统
            (function initParticles() {
                const canvas = document.createElement('canvas');
                canvas.id = 'particles-canvas';
                document.querySelector('.ambient-bg')?.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                let particles = [];
                let mouse = { x: -1000, y: -1000 };
                function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
                resize(); window.addEventListener('resize', resize);
                const count = window.innerWidth < 768 ? 30 : 60;
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
                        size: Math.random() * 2 + 1, opacity: Math.random() * 0.5 + 0.1,
                        color: ['99,102,241','34,211,238','168,139,250','244,114,182'][Math.floor(Math.random()*4)]
                    });
                }
                document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
                document.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        const dx = mouse.x - p.x, dy = mouse.y - p.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 120) { const f = (120 - dist)/120; p.x -= dx*f*0.02; p.y -= dy*f*0.02; }
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(${p.color},${p.opacity})`; ctx.fill();
                    });
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i+1; j < particles.length; j++) {
                            const dx = particles[j].x - particles[i].x, dy = particles[j].y - particles[i].y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if (dist < 100) {
                                ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(99,102,241,${(1-dist/100)*0.12})`;
                                ctx.lineWidth = 0.5; ctx.stroke();
                            }
                        }
                    }
                    requestAnimationFrame(animate);
                }
                animate();
            })();

            // 签名水印
            (function initWatermark() {
                const wm = document.createElement('div');
                wm.className = 'signature-watermark';
                wm.innerHTML = `<span class="w-dot"></span> AI Nexus · QClaw ${new Date().getFullYear()} · v8.1`;
                document.body.appendChild(wm);
            })();

            // 归档页环形进度动画
            (function initRingStats() {
                const rings = document.querySelectorAll('.ring-stat-card');
                const obs = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            rings.forEach(ring => {
                                ring.classList.add('animate');
                                const val = ring.querySelector('.stat-value');
                                const target = parseInt(val.textContent);
                                if (!isNaN(target) && target > 0) {
                                    let current = 0; const step = target / 40;
                                    const timer = setInterval(() => {
                                        current += step;
                                        if (current >= target) { val.textContent = target; clearInterval(timer); }
                                        else val.textContent = Math.floor(current);
                                    }, 30);
                                }
                            });
                            obs.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.3 });
                const dash = document.getElementById('stats-dashboard');
                if (dash) obs.observe(dash);
            })();

            // 数字计数动画
            document.querySelectorAll('.stat-value').forEach(el => {
                const target = parseInt(el.textContent);
                if (isNaN(target)) return;
                const obs = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            let current = 0; const step = target / 40;
                            const timer = setInterval(() => {
                                current += step;
                                if (current >= target) { el.textContent = target; clearInterval(timer); }
                                else el.textContent = Math.floor(current);
                            }, 30);
                            obs.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.5 });
                obs.observe(el);
            });
        });
    </script>
</body>
</html>
