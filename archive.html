<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容归档 | AI Nexus</title>
    <meta name="description" content="过往每日更新的内容存档">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- 动态背景 -->
    <div class="ambient-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- 导航 -->
    <nav class="glass-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">AI Nexus</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <span class="nav-icon">◉</span>首页
                </a>
                <a href="papers.html" class="nav-link">
                    <span class="nav-icon">◈</span>论文精选
                </a>
                <a href="news.html" class="nav-link">
                    <span class="nav-icon">◇</span>产业资讯
                </a>
                <a href="archive.html" class="nav-link active">
                    <span class="nav-icon">○</span>内容归档
                </a>
            </div>
            <div class="nav-meta">
                <span class="live-indicator">
                    <span class="pulse"></span>LIVE
                </span>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1><span class="gradient-text">内容归档</span></h1>
            <p>过往每日更新的内容存档</p>
        </div>

        <section class="archive-section">
            <div class="archive-grid" id="archive-list">
                <!-- 动态加载 -->
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo-icon">◈</span>
                <span>AI Nexus</span>
            </div>
            <p class="footer-tagline">由 QClaw AI 驱动 · 每日自动更新</p>
            <p class="copyright">© 2026 AI Nexus · Built with QClaw</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('archive-list');

            // 尝试从 posts 目录或 siteData 构建归档
            let archiveItems = [];

            // 如果 siteData 有 archive 字段
            if (typeof siteData !== 'undefined' && siteData.archive && siteData.archive.length > 0) {
                archiveItems = siteData.archive;
            }

            if (archiveItems.length > 0) {
                container.innerHTML = archiveItems.map(item => `
                    <div class="archive-card">
                        <div class="archive-date">${item.date}</div>
                        <h3>${item.title || '每日精选'}</h3>
                        <div class="archive-stats">
                            <span>📄 ${item.papers || 0} 篇论文</span>
                            <span>📰 ${item.news || 0} 条资讯</span>
                        </div>
                    </div>
                `).join('');
            } else {
                // 用当前数据生成一条归档记录
                const today = new Date().toLocaleDateString('zh-CN', {
                    year: 'numeric', month: '2-digit', day: '2-digit'
                });
                const paperCount = typeof siteData !== 'undefined'
                    ? Object.values(siteData.papers).reduce((s, a) => s + a.length, 0)
                    : 0;
                const newsCount = typeof siteData !== 'undefined' ? siteData.news.length : 0;

                container.innerHTML = `
                    <div class="archive-card">
                        <div class="archive-date">${today}</div>
                        <h3>今日精选内容</h3>
                        <div class="archive-stats">
                            <span>📄 ${paperCount} 篇论文</span>
                            <span>📰 ${newsCount} 条资讯</span>
                        </div>
                    </div>
                    <div class="empty-state" style="grid-column:1/-1;padding:40px 20px;">
                        <div class="icon">📚</div>
                        <p>历史存档将在每日更新后自动积累</p>
                        <p style="font-size:0.85rem;margin-top:8px;color:var(--text-muted)">每日更新后会自动归档</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
