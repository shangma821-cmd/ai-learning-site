<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 灵儿的知识花园 · AI Nexus</title>
    <meta name="description" content="灵儿的 AI 知识花园 — 每日精选论文、产业资讯与跨界探索">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 动态背景 -->
    <div class="ambient-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- 顶部导航 -->
    <nav class="glass-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">灵儿的知识花园</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">
                    <span class="nav-icon">◉</span>今日
                </a>
                <a href="papers.html" class="nav-link">
                    <span class="nav-icon">◈</span>论文精选
                </a>
                <a href="news.html" class="nav-link">
                    <span class="nav-icon">◇</span>产业资讯
                </a>
                <a href="archive.html" class="nav-link">
                    <span class="nav-icon">○</span>内容归档
                </a>
            </div>
            <div class="nav-meta">
                <div class="nav-stats" id="nav-stats">
                    <span class="streak-badge">
                        <i class="fas fa-fire"></i>
                        <span id="streak-count">1</span> 天
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main>
        <!-- 今日精选 -->
        <section id="today" class="section today-section active">
            <div class="section-header">
                <h1><i class="fas fa-sun"></i> 今日新知</h1>
                <span class="date" id="today-date"></span>
            </div>

            <!-- 论文卡片 -->
            <div class="card-grid papers-grid" id="papers-container">
                <!-- 动态加载 -->
            </div>

            <!-- 产业资讯 -->
            <div class="news-section">
                <h2><i class="fas fa-newspaper"></i> 产业脉搏</h2>
                <div class="news-timeline" id="news-container">
                    <!-- 动态加载 -->
                </div>
            </div>

            <!-- 破茧时刻 -->
            <div class="babel-section">
                <h2><i class="fas fa-seedling"></i> 破茧时刻</h2>
                <p class="section-desc">跳出信息茧房，遇见意想不到的知识</p>
                <div class="babel-cards" id="babel-container">
                    <!-- 动态加载 -->
                </div>
            </div>
        </section>

        <!-- 知识花园 -->
        <section id="garden" class="section garden-section">
            <div class="section-header">
                <h1><i class="fas fa-tree"></i> 知识花园</h1>
                <span class="garden-stats" id="garden-stats"></span>
            </div>

            <!-- 知识图谱 -->
            <div class="knowledge-graph" id="knowledge-graph">
                <canvas id="graph-canvas"></canvas>
            </div>

            <!-- 最近学习 -->
            <div class="recent-learning">
                <h3><i class="fas fa-history"></i> 最近探索</h3>
                <div class="learning-trail" id="learning-trail">
                    <!-- 动态加载 -->
                </div>
            </div>
        </section>

        <!-- 学习档案 -->
        <section id="archive" class="section archive-section">
            <div class="section-header">
                <h1><i class="fas fa-archive"></i> 学习档案</h1>
            </div>

            <!-- 学习统计 -->
            <div class="stats-dashboard" id="stats-dashboard">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-book"></i></div>
                    <div class="stat-value" id="total-papers">0</div>
                    <div class="stat-label">论文阅读</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-fire"></i></div>
                    <div class="stat-value" id="streak-days">1</div>
                    <div class="stat-label">连续学习</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-lightbulb"></i></div>
                    <div class="stat-value" id="total-insights">0</div>
                    <div class="stat-label">获得洞见</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-compass"></i></div>
                    <div class="stat-value" id="fields-explored">0</div>
                    <div class="stat-label">探索领域</div>
                </div>
            </div>

            <!-- 历史记录 -->
            <div class="history-calendar" id="history-calendar"></div>
        </section>

        <!-- AI 对话 -->
        <section id="chat" class="section chat-section">
            <div class="section-header">
                <h1><i class="fas fa-comments"></i> 学习对话</h1>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="message assistant">
                        <div class="avatar">🧠</div>
                        <div class="content">
                            你好！我是灵儿，你的学习伙伴。有什么想聊的吗？<br><br>
                            你可以问我：<br>
                            • "今天有什么值得读的论文？"<br>
                            • "帮我解释一下 Transformer 是什么"<br>
                            • "最近 AI 教育领域有什么新进展？"
                        </div>
                    </div>
                </div>
                <div class="chat-input-container">
                    <input type="text" id="chat-input" placeholder="问点什么..." />
                    <button id="chat-send"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </section>
    </main>

    <!-- 快捷操作 -->
    <div class="quick-actions">
        <button class="action-btn" id="btn-mark-read" title="标记已读">
            <i class="fas fa-check"></i>
        </button>
        <button class="action-btn" id="btn-save" title="收藏">
            <i class="fas fa-bookmark"></i>
        </button>
        <button class="action-btn" id="btn-share" title="分享">
            <i class="fas fa-share-alt"></i>
        </button>
    </div>

    <!-- 底部 -->
    <footer class="glass-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo-icon">◈</span>
                <span>灵儿的知识花园</span>
            </div>
            <p class="footer-tagline">由 QClaw AI 驱动 · 每日生长</p>
            <p class="copyright">© 2026 AI Nexus · Built with QClaw</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script src="scripts/app.js"></script>
    <script>
    // 今日日期
    document.addEventListener('DOMContentLoaded', function() {
        const dateEl = document.getElementById('today-date');
        if (dateEl) {
            const now = new Date();
            dateEl.textContent = now.toLocaleDateString('zh-CN', {
                year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
            });
        }

        // 渲染论文卡片
        const papersContainer = document.getElementById('papers-container');
        if (papersContainer && typeof siteData !== 'undefined') {
            const tagMap = {
                ai:     { cls: 'ai',     label: '🤖 AI' },
                edu:    { cls: 'edu',    label: '📚 AI教育' },
                health: { cls: 'health', label: '🏥 AI健康' }
            };
            let cards = [];
            Object.entries(siteData.papers).forEach(([key, list]) => {
                const t = tagMap[key] || { cls: 'ai', label: key };
                list.slice(0, 2).forEach(p => {
                    cards.push(`
                        <div class="paper-card">
                            <span class="tag ${t.cls}">${t.label}</span>
                            <h3><a href="${p.url}" target="_blank" rel="noopener">${p.title}</a></h3>
                            <p class="meta">${p.venue} · ${p.authors}</p>
                            <p class="summary">${p.summary}</p>
                            <div class="actions">
                                <a href="${p.url}" target="_blank" rel="noopener" class="btn btn-primary">阅读原文</a>
                                <button class="btn btn-ghost" onclick="this.textContent='✓ 已收藏'">收藏</button>
                            </div>
                        </div>
                    `);
                });
            });
            papersContainer.innerHTML = cards.join('');
        }

        // 渲染新闻
        const newsContainer = document.getElementById('news-container');
        if (newsContainer && typeof siteData !== 'undefined') {
            newsContainer.innerHTML = siteData.news.slice(0, 6).map(item => `
                <div class="news-item">
                    <span class="time">${item.date ? item.date.slice(5) : '--'}</span>
                    <div class="content">
                        <div class="title">
                            <a href="${item.url || '#'}" target="_blank" rel="noopener">${item.title}</a>
                        </div>
                        <div class="source">${item.source}</div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染破茧
        const babelContainer = document.getElementById('babel-container');
        if (babelContainer && typeof siteData !== 'undefined') {
            const emojiMap = {
                thinking: '🧠', science: '🔬', tech: '💻',
                design: '🎨', history: '📜', nature: '🌿'
            };
            babelContainer.innerHTML = siteData.babel.slice(0, 4).map(item => `
                <div class="babel-card" onclick="window.open('${item.url || '#'}','_blank')">
                    <div class="emoji">${emojiMap[item.category] || '✨'}</div>
                    <h4>${item.title}</h4>
                    <div class="field">${item.source}</div>
                </div>
            `).join('');
        }

        // 导航切换
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href.startsWith('#')) {
                    e.preventDefault();
                    const target = href.slice(1);
                    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    const section = document.getElementById(target);
                    if (section) section.classList.add('active');
                    this.classList.add('active');
                }
            });
        });
    });
    </script>
</body>
</html>
