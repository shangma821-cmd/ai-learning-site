<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产业资讯 | AI Nexus</title>
    <meta name="description" content="AI 领域的最新动态与趋势">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- 动态背景 -->
    <div class="ambient-bg fluid-gradient dawn-gradient">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
        <div class="dots-grid"></div>
    </div>

    <!-- 跳过导航 -->
    <a href="#main-content" class="skip-link">跳到主要内容</a>

    <!-- 阅读进度条 -->
    <div class="reading-progress" id="reading-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

    <!-- 导航 -->
    <nav class="glass-nav" role="navigation" aria-label="主导航">
        <div class="nav-container">
            <a href="index.html" class="logo" aria-label="AI Nexus首页">
                <span class="logo-icon" aria-hidden="true">◈</span>
                <span class="logo-text">AI Nexus</span>
            </a>
            <div class="nav-links" id="nav-links" role="menubar">
                <a href="index.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◉</span>首页
                </a>
                <a href="papers.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◈</span>论文精选
                </a>
                <a href="news.html" class="nav-link active" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◇</span>产业资讯
                </a>
                <a href="archive.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">○</span>内容归档
                </a>
            </div>
            <div class="nav-actions" style="margin-left:auto;display:flex;align-items:center;gap:10px;">
                <button class="theme-toggle" id="theme-toggle" aria-label="切换暗色/亮色模式" title="切换主题">
                    <i class="fas fa-adjust"></i>
                </button>
                <button class="reading-mode-toggle" id="reading-mode-toggle" aria-label="切换阅读模式" title="纸张阅读模式">
                    <i class="fas fa-book-open"></i>
                </button>
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="打开菜单" aria-expanded="false" style="display:none;">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container" id="main-content">
        <div class="page-header">
            <div class="hero-badge">
                <span class="pulse-dot"></span>
                每日更新 · 紧跟前沿
            </div>
            <h1><span class="animated-gradient-text">产业资讯</span></h1>
            <p>AI 领域的最新动态与趋势</p>
        </div>

        <!-- 趋势标签 -->
        <div class="trending-tags" id="trending-tags">
            <span class="trending-tag" data-hot="true"><span>🤖 AI前沿</span></span>
            <span class="trending-tag"><span>📚 教育</span></span>
            <span class="trending-tag"><span>🏥 健康</span></span>
            <span class="trending-tag"><span>🔬 科学</span></span>
            <span class="trending-tag"><span>💡 思维</span></span>
        </div>

        <section class="news-section-page neural-gradient sustainable-responsive glass-card-enhanced organic-radius">
            <h2 class="adaptive-gradient organic-radius"><i class="fas fa-newspaper neural-icon"></i> 最新资讯</h2>
            <div class="news-grid-page" id="news-list"></div>
        </section>

        <section class="news-section-page break-babel-page">
            <h2><i class="fas fa-seedling" style="color:#34d399;"></i> 破茧资讯</h2>
            <div class="news-grid-page" id="babel-list"></div>
        </section>
    </main>

    <footer class="glass-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo-icon">◈</span>
                <span>AI Nexus</span>
            </div>
            <p class="footer-tagline">由 QClaw AI 驱动 · 每日自动更新</p>
            <p class="copyright">© 2026 AI Nexus · Built with QClaw</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const categoryMap = {
                ai:     { emoji: '🤖', cls: 'ai' },
                edu:    { emoji: '📚', cls: 'edu' },
                health: { emoji: '🏥', cls: 'health' }
            };

            const formatNews = (item, idx) => {
                const cat = categoryMap[item.category] || { emoji: '📌', cls: 'default' };
                const isHot = idx < 3;
                return `
                    <div class="news-card hover-shadow-lift reveal" style="animation-delay:${idx * 0.06}s">
                        <span class="tag ${cat.cls}">${isHot ? '<span class="badge-hot">HOT</span> ' : ''}${cat.emoji} ${item.category ? item.category.toUpperCase() : ''}</span>
                        <h3>${item.title}</h3>
                        <p class="news-meta">${item.source} · ${item.date}</p>
                        <p class="news-summary">${item.summary || ''}</p>
                        ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener" class="magnetic-btn" style="display:inline-flex;align-items:center;gap:5px;color:var(--accent-cyan);font-size:0.82rem;margin-top:12px;font-weight:500;">阅读全文 →</a>` : ''}
                    </div>
                `;
            };

            document.getElementById('news-list').innerHTML =
                siteData.news.map((item, i) => formatNews(item, i)).join('');
            document.getElementById('babel-list').innerHTML =
                siteData.babel.map((item, i) => formatNews(item, i)).join('');

            // 阅读进度条
            const progressBar = document.getElementById('reading-progress');
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                progressBar.style.width = (docHeight > 0 ? (scrollTop / docHeight) * 100 : 0) + '%';
            });

            // 暗色/亮色模式切换
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const isDark = !document.body.classList.contains('light-theme');
                    document.body.classList.toggle('light-theme');
                    themeToggle.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                    localStorage.setItem('theme', isDark ? 'light' : 'dark');
                });
                if (localStorage.getItem('theme') === 'light') {
                    document.body.classList.add('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
            }

            // 阅读模式切换
            const readingModeToggle = document.getElementById('reading-mode-toggle');
            if (readingModeToggle) {
                readingModeToggle.addEventListener('click', () => {
                    const isReading = document.body.classList.toggle('reading-mode');
                    readingModeToggle.style.background = isReading ? 'rgba(99,102,241,0.2)' : '';
                    readingModeToggle.style.borderColor = isReading ? 'rgba(99,102,241,0.4)' : '';
                    localStorage.setItem('readingMode', isReading ? 'on' : 'off');
                });
                if (localStorage.getItem('readingMode') === 'on') {
                    document.body.classList.add('reading-mode');
                    readingModeToggle.style.background = 'rgba(99,102,241,0.2)';
                    readingModeToggle.style.borderColor = 'rgba(99,102,241,0.4)';
                }
            }

            // 移动端菜单
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.getElementById('nav-links');
            if (mobileMenuBtn && navLinks) {
                mobileMenuBtn.addEventListener('click', () => {
                    const isOpen = navLinks.classList.toggle('open');
                    mobileMenuBtn.setAttribute('aria-expanded', String(isOpen));
                    mobileMenuBtn.innerHTML = isOpen ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
                });
            }

            // 滚动动画
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('stagger-in'); e.target.classList.add('visible'); observer.unobserve(e.target); } });
            }, { threshold: 0.1 });
            document.querySelectorAll('.news-card').forEach(el => observer.observe(el));

            // 磁性按钮效果
            document.querySelectorAll('.magnetic-btn').forEach(btn => {
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.transform = 'translate(0, 0)';
                });
            });

            // 粒子系统
            (function initParticles() {
                const canvas = document.createElement('canvas');
                canvas.id = 'particles-canvas';
                document.querySelector('.ambient-bg')?.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                let particles = [];
                let mouse = { x: -1000, y: -1000 };
                function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
                resize(); window.addEventListener('resize', resize);
                const count = window.innerWidth < 768 ? 30 : 60;
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
                        size: Math.random() * 2 + 1, opacity: Math.random() * 0.5 + 0.1,
                        color: ['99,102,241','34,211,238','168,139,250','244,114,182'][Math.floor(Math.random()*4)]
                    });
                }
                document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
                document.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        const dx = mouse.x - p.x, dy = mouse.y - p.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 120) { const f = (120 - dist)/120; p.x -= dx*f*0.02; p.y -= dy*f*0.02; }
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(${p.color},${p.opacity})`; ctx.fill();
                    });
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i+1; j < particles.length; j++) {
                            const dx = particles[j].x - particles[i].x, dy = particles[j].y - particles[i].y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if (dist < 100) {
                                ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(99,102,241,${(1-dist/100)*0.12})`;
                                ctx.lineWidth = 0.5; ctx.stroke();
                            }
                        }
                    }
                    requestAnimationFrame(animate);
                }
                animate();
            })();

            // 签名水印
            (function initWatermark() {
                const wm = document.createElement('div');
                wm.className = 'signature-watermark';
                wm.innerHTML = `<span class="w-dot"></span> AI Nexus · QClaw ${new Date().getFullYear()} · v6.9`;
                document.body.appendChild(wm);
            })();

            // 数字计数动画
            document.querySelectorAll('.stat-value').forEach(el => {
                const target = parseInt(el.textContent);
                if (isNaN(target)) return;
                const obs = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            let current = 0; const step = target / 40;
                            const timer = setInterval(() => {
                                current += step;
                                if (current >= target) { el.textContent = target; clearInterval(timer); }
                                else el.textContent = Math.floor(current);
                            }, 30);
                            obs.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.5 });
                obs.observe(el);
            });
        });
    </script>
</body>
</html>
