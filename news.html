<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产业资讯 | AI Nexus</title>
    <meta name="description" content="AI 领域的最新动态与趋势">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- 动态背景 -->
    <div class="ambient-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- 导航 -->
    <nav class="glass-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">AI Nexus</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">
                    <span class="nav-icon">◉</span>首页
                </a>
                <a href="papers.html" class="nav-link">
                    <span class="nav-icon">◈</span>论文精选
                </a>
                <a href="news.html" class="nav-link active">
                    <span class="nav-icon">◇</span>产业资讯
                </a>
                <a href="archive.html" class="nav-link">
                    <span class="nav-icon">○</span>内容归档
                </a>
            </div>
            <div class="nav-meta">
                <span class="live-indicator">
                    <span class="pulse"></span>LIVE
                </span>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1><span class="gradient-text">产业资讯</span></h1>
            <p>AI 领域的最新动态与趋势</p>
        </div>

        <section class="news-section-page">
            <h2>📰 最新资讯</h2>
            <div class="news-grid-page" id="news-list"></div>
        </section>

        <section class="news-section-page break-babel-page">
            <h2>🌈 破茧资讯</h2>
            <div class="news-grid-page" id="babel-list"></div>
        </section>
    </main>

    <footer class="glass-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo-icon">◈</span>
                <span>AI Nexus</span>
            </div>
            <p class="footer-tagline">由 QClaw AI 驱动 · 每日自动更新</p>
            <p class="copyright">© 2026 AI Nexus · Built with QClaw</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const categoryMap = {
                ai:     { emoji: '🤖', cls: 'ai' },
                edu:    { emoji: '📚', cls: 'edu' },
                health: { emoji: '🏥', cls: 'health' }
            };

            const formatNews = item => {
                const cat = categoryMap[item.category] || { emoji: '📌', cls: 'default' };
                return `
                    <div class="news-card">
                        <span class="tag ${cat.cls}">${cat.emoji} ${item.category ? item.category.toUpperCase() : ''}</span>
                        <h3>${item.title}</h3>
                        <p class="news-meta">${item.source} · ${item.date}</p>
                        <p class="news-summary">${item.summary || ''}</p>
                        ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;color:var(--accent-cyan);font-size:0.82rem;margin-top:12px;font-weight:500;">阅读全文 →</a>` : ''}
                    </div>
                `;
            };

            document.getElementById('news-list').innerHTML =
                siteData.news.map(formatNews).join('');
            document.getElementById('babel-list').innerHTML =
                siteData.babel.map(formatNews).join('');
        });
    </script>
</body>
</html>
