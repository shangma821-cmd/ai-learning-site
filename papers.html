<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文精选 | AI Nexus</title>
    <meta name="description" content="全球顶级会议/期刊的最新 AI 研究成果精选">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- 动态背景 -->
    <div class="ambient-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- 跳过导航 -->
    <a href="#main-content" class="skip-link">跳到主要内容</a>

    <!-- 阅读进度条 -->
    <div class="reading-progress" id="reading-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

    <!-- 导航 -->
    <nav class="glass-nav" role="navigation" aria-label="主导航">
        <div class="nav-container">
            <a href="index.html" class="logo" aria-label="AI Nexus首页">
                <span class="logo-icon" aria-hidden="true">◈</span>
                <span class="logo-text">AI Nexus</span>
            </a>
            <div class="nav-links" id="nav-links" role="menubar">
                <a href="index.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◉</span>首页
                </a>
                <a href="papers.html" class="nav-link active" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◈</span>论文精选
                </a>
                <a href="news.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◇</span>产业资讯
                </a>
                <a href="archive.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">○</span>内容归档
                </a>
            </div>
            <div class="nav-actions" style="margin-left:auto;display:flex;align-items:center;gap:10px;">
                <button class="theme-toggle" id="theme-toggle" aria-label="切换暗色/亮色模式" title="切换主题">
                    <i class="fas fa-adjust"></i>
                </button>
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="打开菜单" aria-expanded="false" style="display:none;">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container" id="main-content">
        <div class="page-header">
            <h1><span class="animated-gradient-text">论文精选</span></h1>
            <p>全球顶级会议 / 期刊的最新研究成果</p>
        </div>

        <section class="papers-section" id="ai">
            <h2><span class="tag-icon">🤖</span>AI 人工智能</h2>
            <div class="papers-list" id="ai-papers"></div>
        </section>

        <section class="papers-section" id="edu">
            <h2><span class="tag-icon">📚</span>AI 教育</h2>
            <div class="papers-list" id="edu-papers"></div>
        </section>

        <section class="papers-section" id="health">
            <h2><span class="tag-icon">🏥</span>AI 健康</h2>
            <div class="papers-list" id="health-papers"></div>
        </section>
    </main>

    <footer class="glass-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo-icon">◈</span>
                <span>AI Nexus</span>
            </div>
            <p class="footer-tagline">由 QClaw AI 驱动 · 每日自动更新</p>
            <p class="copyright">© 2026 AI Nexus · Built with QClaw</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const formatPaper = (p, tagCls, idx) => `
                <div class="paper-card tilt-card reveal ${idx === 0 ? 'featured-card' : ''}" style="animation-delay:${idx * 0.08}s">
                    ${tagCls ? `<span class="tag ${tagCls}">${tagCls === 'ai' ? '🤖 AI' : tagCls === 'edu' ? '📚 教育' : '🏥 健康'}</span>` : ''}
                    <h3>${p.title}</h3>
                    <p class="paper-meta">${p.venue} · ${p.authors}</p>
                    <p class="paper-summary">${p.summary}</p>
                    <a href="${p.url}" target="_blank" rel="noopener" class="paper-link magnetic-btn">
                        阅读原文 <span>→</span>
                    </a>
                </div>
            `;

            document.getElementById('ai-papers').innerHTML =
                siteData.papers.ai.map((p, i) => formatPaper(p, 'ai', i)).join('');
            document.getElementById('edu-papers').innerHTML =
                siteData.papers.edu.map((p, i) => formatPaper(p, 'edu', i)).join('');
            document.getElementById('health-papers').innerHTML =
                siteData.papers.health.map((p, i) => formatPaper(p, 'health', i)).join('');

            // 阅读进度条
            const progressBar = document.getElementById('reading-progress');
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                progressBar.style.width = (docHeight > 0 ? (scrollTop / docHeight) * 100 : 0) + '%';
            });

            // 暗色/亮色模式切换
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const isDark = !document.body.classList.contains('light-theme');
                    document.body.classList.toggle('light-theme');
                    themeToggle.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                    localStorage.setItem('theme', isDark ? 'light' : 'dark');
                });
                if (localStorage.getItem('theme') === 'light') {
                    document.body.classList.add('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
            }

            // 移动端菜单
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.getElementById('nav-links');
            if (mobileMenuBtn && navLinks) {
                mobileMenuBtn.addEventListener('click', () => {
                    const isOpen = navLinks.classList.toggle('open');
                    mobileMenuBtn.setAttribute('aria-expanded', String(isOpen));
                    mobileMenuBtn.innerHTML = isOpen ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
                });
            }

            // 滚动动画
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('stagger-in'); e.target.classList.add('visible'); observer.unobserve(e.target); } });
            }, { threshold: 0.1 });
            document.querySelectorAll('.paper-card').forEach(el => observer.observe(el));

            // 3D 倾斜效果
            document.querySelectorAll('.tilt-card').forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 20;
                    const rotateY = (centerX - x) / 20;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateZ(0)';
                });
            });

            // 磁性按钮效果
            document.querySelectorAll('.magnetic-btn').forEach(btn => {
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.transform = 'translate(0, 0)';
                });
            });

            // 粒子系统
            (function initParticles() {
                const canvas = document.createElement('canvas');
                canvas.id = 'particles-canvas';
                document.querySelector('.ambient-bg')?.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                let particles = [];
                let mouse = { x: -1000, y: -1000 };
                function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
                resize(); window.addEventListener('resize', resize);
                const count = window.innerWidth < 768 ? 30 : 60;
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
                        size: Math.random() * 2 + 1, opacity: Math.random() * 0.5 + 0.1,
                        color: ['99,102,241','34,211,238','168,139,250','244,114,182'][Math.floor(Math.random()*4)]
                    });
                }
                document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
                document.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        const dx = mouse.x - p.x, dy = mouse.y - p.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 120) { const f = (120 - dist)/120; p.x -= dx*f*0.02; p.y -= dy*f*0.02; }
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(${p.color},${p.opacity})`; ctx.fill();
                    });
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i+1; j < particles.length; j++) {
                            const dx = particles[j].x - particles[i].x, dy = particles[j].y - particles[i].y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if (dist < 100) {
                                ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(99,102,241,${(1-dist/100)*0.12})`;
                                ctx.lineWidth = 0.5; ctx.stroke();
                            }
                        }
                    }
                    requestAnimationFrame(animate);
                }
                animate();
            })();

            // 签名水印
            (function initWatermark() {
                const wm = document.createElement('div');
                wm.className = 'signature-watermark';
                wm.innerHTML = `<span class="w-dot"></span> AI Nexus · QClaw ${new Date().getFullYear()} · v6.9`;
                document.body.appendChild(wm);
            })();

            // 论文选中状态
            document.querySelectorAll('.paper-card').forEach(card => {
                card.addEventListener('click', e => {
                    if (e.target.closest('a') || e.target.closest('button')) return;
                    card.classList.toggle('selected');
                });
            });

            // 数字计数动画
            document.querySelectorAll('.stat-value').forEach(el => {
                const target = parseInt(el.textContent);
                if (isNaN(target)) return;
                const obs = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            let current = 0; const step = target / 40;
                            const timer = setInterval(() => {
                                current += step;
                                if (current >= target) { el.textContent = target; clearInterval(timer); }
                                else el.textContent = Math.floor(current);
                            }, 30);
                            obs.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.5 });
                obs.observe(el);
            });
        });
    </script>
</body>
</html>
