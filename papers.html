<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文精选 | AI Nexus</title>
    <meta name="description" content="全球顶级会议/期刊的最新 AI 研究成果精选">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>

    <!-- 动态背景 -->

        <div class="gradient-orb orb-2"></div>

    <!-- 跳过导航 -->

    <!-- 阅读进度条 -->

    <!-- 导航 -->
    <nav class="glass-nav" role="navigation" aria-label="主导航">
        <div class="nav-container">
            <a href="index.html" class="logo" aria-label="AI Nexus首页">
                <span class="logo-icon" aria-hidden="true">◈</span>
                <span class="logo-text">AI Nexus</span>
            </a>
            <div class="nav-links" id="nav-links" role="menubar">
                <a href="index.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◉</span>首页
                </a>
                <a href="papers.html" class="nav-link active" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◈</span>论文精选
                </a>
                <a href="news.html" class="nav-link" role="menuitem">
                    <span class="nav-icon" aria-hidden="true">◇</span>产业资讯

                    <span class="nav-icon" aria-hidden="true">○</span>内容归档

            </div>
            <div class="nav-actions" style="margin-left:auto;display:flex;align-items:center;gap:10px;">
                <button class="theme-toggle" id="theme-toggle" aria-label="切换暗色/亮色模式" title="切换主题">

    <main class="container" id="main-content">
        <div class="page-header">

                每日更新 · 精选前沿
            </div>
            <h1><span class="animated-gradient-text">论文精选</span></h1>
            <p>全球顶级会议 / 期刊的最新研究成果</p>
            <div class="hero-stats-bar">
                <span><i class="fas fa-book"></i> <span id="paper-total-count">0</span> 篇论文</span>

        </div>

        <!-- 搜索与筛选 -->

            <div class="filter-chips" id="paper-filter-chips">
                <button class="filter-chip active" data-filter="all"><span>全部</span></button>
                <button class="filter-chip" data-filter="ai">🤖 AI前沿</button>
                <button class="filter-chip" data-filter="edu">📚 AI教育</button>

            </div>
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input paper-search" placeholder="搜索论文标题或关键词…" id="paper-search-input"/>
            </div>
        </div>

        <!-- AI 人工智能 -->
        <section class="papers-section neural-gradient sustainable-responsive glass-card-enhanced organic-radius" id="ai">
            <h2 class="adaptive-gradient organic-radius"><i class="fas fa-robot neural-icon"></i> AI 人工智能</h2>
            <div class="papers-list" id="ai-papers"></div>
        </section>

        <!-- AI 教育 -->
        <section class="papers-section" id="edu">
            <h2><i class="fas fa-graduation-cap" style="color:#f472b6;"></i> AI 教育</h2>
            <div class="papers-list" id="edu-papers"></div>
        </section>

        <!-- AI 健康 -->
        <section class="papers-section" id="health">
            <h2><i class="fas fa-heartbeat" style="color:#34d399;"></i> AI 健康</h2>
            <div class="papers-list" id="health-papers"></div>
        </section>

    <footer class="glass-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="logo-icon">◈</span>
                <span>AI Nexus</span>
            </div>
            <p class="footer-tagline">由 QClaw AI 驱动 · 每日自动更新</p>
            <p class="copyright">© 2026 AI Nexus · Built with QClaw</p>
        </div>
    </footer>

    <script src="scripts/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ── 论文卡片渲染 ──
            const diffLabels = { easy: '简单', medium: '中等', hard: '困难' };
            const formatPaper = (p, tagCls, idx) => {
                const isFeatured = idx === 0;
                const diff = diffLabels[p.difficulty] || '中等';
                const readTime = p.readTime || '8 分钟';
                const citations = p.citations || 0;
                return `
                <div class="paper-card ${isFeatured ? 'featured-card tilt-card' : 'tilt-card'} reveal" data-category="${tagCls}" data-title="${p.title}" data-summary="${p.summary}" style="animation-delay:${idx * 0.08}s">
                    <div class="glow-bar"></div>
                    <div class="hover-progress-bar"></div>
                    ${tagCls ? `<span class="tag ${tagCls}">${tagCls === 'ai' ? '🤖 AI' : tagCls === 'edu' ? '📚 教育' : '🏥 健康'}</span>` : ''}
                    ${isFeatured ? '<span class="badge-hot">HOT</span>' : ''}
                    <h3><a href="${p.url}" target="_blank" rel="noopener">${p.title}</a></h3>
                    <p class="meta">${p.venue} · ${p.authors}</p>
                    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
                        <span class="read-time"><i class="far fa-clock"></i> ${readTime}</span>
                        <span class="citation-badge">📖 ${citations}</span>
                        <span class="diff-indicator" data-diff="${p.difficulty || 'medium'}">
                            <span class="dot filled"></span>
                            <span class="dot ${p.difficulty === 'hard' || p.difficulty === 'medium' ? 'filled' : ''}"></span>
                            <span class="dot ${p.difficulty === 'hard' ? 'filled' : ''}"></span>
                        </span>
                        <span style="font-size:0.72rem;color:var(--text-muted);padding:2px 8px;background:var(--bg-glass);border-radius:var(--radius-full);">${diff}</span>
                    </div>
                    <p class="summary">${p.summary}</p>
                    <div class="actions">
                        <a href="${p.url}" target="_blank" rel="noopener" class="btn btn-primary magnetic-btn">阅读原文</a>
                        <button class="btn btn-ghost" onclick="this.textContent='✓ 已收藏'; this.classList.add('saved');">收藏</button>
                    </div>
                </div>
            `};

            const renderAllPapers = () => {
                document.getElementById('ai-papers').innerHTML =
                    siteData.papers.ai.map((p, i) => formatPaper(p, 'ai', i)).join('');
                document.getElementById('edu-papers').innerHTML =
                    siteData.papers.edu.map((p, i) => formatPaper(p, 'edu', i)).join('');
                document.getElementById('health-papers').innerHTML =
                    siteData.papers.health.map((p, i) => formatPaper(p, 'health', i)).join('');

                // 更新论文总数
                const total = siteData.papers.ai.length + siteData.papers.edu.length + siteData.papers.health.length;
                document.getElementById('paper-total-count').textContent = total;

                // 重新绑定 3D 倾斜效果
                document.querySelectorAll('.tilt-card').forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        const centerX = rect.width / 2;
                        const centerY = rect.height / 2;
                        const rotateX = (y - centerY) / 20;
                        const rotateY = (centerX - x) / 20;
                        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
                    });
                    card.addEventListener('mouseleave', () => {
                        card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateZ(0)';
                    });
                });

                // 滚动动画
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('stagger-in'); e.target.classList.add('visible'); observer.unobserve(e.target); } });
                }, { threshold: 0.1 });
                document.querySelectorAll('.paper-card').forEach(el => observer.observe(el));

                // 初始化筛选
                initPaperFilterOnPage();
            };

            renderAllPapers();

            // 阅读进度条
            const progressBar = document.getElementById('reading-progress');
            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                progressBar.style.width = (docHeight > 0 ? (scrollTop / docHeight) * 100 : 0) + '%';
            });

            // 暗色/亮色模式切换
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const isDark = !document.body.classList.contains('light-theme');
                    document.body.classList.toggle('light-theme');
                    themeToggle.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                    localStorage.setItem('theme', isDark ? 'light' : 'dark');
                });
                if (localStorage.getItem('theme') === 'light') {
                    document.body.classList.add('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
            }

            // 阅读模式切换
            const readingModeToggle = document.getElementById('reading-mode-toggle');
            if (readingModeToggle) {
                readingModeToggle.addEventListener('click', () => {
                    const isReading = document.body.classList.toggle('reading-mode');
                    readingModeToggle.style.background = isReading ? 'rgba(99,102,241,0.2)' : '';
                    readingModeToggle.style.borderColor = isReading ? 'rgba(99,102,241,0.4)' : '';
                    localStorage.setItem('readingMode', isReading ? 'on' : 'off');
                });
                if (localStorage.getItem('readingMode') === 'on') {
                    document.body.classList.add('reading-mode');
                    readingModeToggle.style.background = 'rgba(99,102,241,0.2)';
                    readingModeToggle.style.borderColor = 'rgba(99,102,241,0.4)';
                }
            }

            // 移动端菜单
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.getElementById('nav-links');
            if (mobileMenuBtn && navLinks) {
                mobileMenuBtn.addEventListener('click', () => {
                    const isOpen = navLinks.classList.toggle('open');
                    mobileMenuBtn.setAttribute('aria-expanded', String(isOpen));
                    mobileMenuBtn.innerHTML = isOpen ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
                });
            }

            // 滚动动画
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('stagger-in'); e.target.classList.add('visible'); observer.unobserve(e.target); } });
            }, { threshold: 0.1 });
            document.querySelectorAll('.paper-card').forEach(el => observer.observe(el));

            // 3D 倾斜效果
            document.querySelectorAll('.tilt-card').forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 20;
                    const rotateY = (centerX - x) / 20;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateZ(0)';
                });
            });

            // 磁性按钮效果
            document.querySelectorAll('.magnetic-btn').forEach(btn => {
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.transform = 'translate(0, 0)';
                });
            });

            // 粒子系统
            (function initParticles() {
                const canvas = document.createElement('canvas');
                canvas.id = 'particles-canvas';
                document.querySelector('.ambient-bg')?.appendChild(canvas);
                const ctx = canvas.getContext('2d');
                let particles = [];
                let mouse = { x: -1000, y: -1000 };
                function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
                resize(); window.addEventListener('resize', resize);
                const count = window.innerWidth < 768 ? 30 : 60;
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
                        size: Math.random() * 2 + 1, opacity: Math.random() * 0.5 + 0.1,
                        color: ['99,102,241','34,211,238','168,139,250','244,114,182'][Math.floor(Math.random()*4)]
                    });
                }
                document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
                document.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                        const dx = mouse.x - p.x, dy = mouse.y - p.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 120) { const f = (120 - dist)/120; p.x -= dx*f*0.02; p.y -= dy*f*0.02; }
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(${p.color},${p.opacity})`; ctx.fill();
                    });
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i+1; j < particles.length; j++) {
                            const dx = particles[j].x - particles[i].x, dy = particles[j].y - particles[i].y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            if (dist < 100) {
                                ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(99,102,241,${(1-dist/100)*0.12})`;
                                ctx.lineWidth = 0.5; ctx.stroke();
                            }
                        }
                    }
                    requestAnimationFrame(animate);
                }
                animate();
            })();

            // 签名水印
            (function initWatermark() {
                const wm = document.createElement('div');
                wm.className = 'signature-watermark';
                wm.innerHTML = `<span class="w-dot"></span> AI Nexus · QClaw ${new Date().getFullYear()} · v6.9`;
                document.body.appendChild(wm);
            })();

            // ── 论文筛选与搜索 ──
            function initPaperFilterOnPage() {
                const chips = document.querySelectorAll('#paper-filter-chips .filter-chip');
                const searchInput = document.getElementById('paper-search-input');
                let currentFilter = 'all';
                let searchTerm = '';

                function filterCards() {
                    document.querySelectorAll('.paper-card').forEach(card => {
                        const category = card.dataset.category || '';
                        const text = (card.dataset.title + ' ' + card.dataset.summary).toLowerCase();
                        const matchesFilter = currentFilter === 'all' || category === currentFilter;
                        const matchesSearch = searchTerm === '' || text.includes(searchTerm);
                        if (matchesFilter && matchesSearch) {
                            card.style.display = '';
                            card.style.animation = 'paper-filter-in 0.35s var(--ease-spring) both';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                }

                chips.forEach(chip => {
                    chip.addEventListener('click', () => {
                        chips.forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        currentFilter = chip.dataset.filter;
                        filterCards();
                    });
                });

                if (searchInput) {
                    let debounceTimer;
                    searchInput.addEventListener('input', () => {
                        clearTimeout(debounceTimer);
                        debounceTimer = setTimeout(() => {
                            searchTerm = searchInput.value.toLowerCase().trim();
                            filterCards();
                        }, 250);
                    });
                }
            }

            // ── 论文选中状态 ──
            document.querySelectorAll('.paper-card').forEach(card => {
                card.addEventListener('click', e => {
                    if (e.target.closest('a') || e.target.closest('button')) return;
                    card.classList.toggle('selected');
                });
            });

            // 数字计数动画
            document.querySelectorAll('.stat-value').forEach(el => {
                const target = parseInt(el.textContent);
                if (isNaN(target)) return;
                const obs = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            let current = 0; const step = target / 40;
                            const timer = setInterval(() => {
                                current += step;
                                if (current >= target) { el.textContent = target; clearInterval(timer); }
                                else el.textContent = Math.floor(current);
                            }, 30);
                            obs.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.5 });
                obs.observe(el);
            });
        });
    </script>
    <style>
        @keyframes paper-filter-in {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .papers-toolbar-new {
            display: flex; gap: 12px; align-items: center;
            margin-bottom: 28px; flex-wrap: wrap;
        }
        .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .search-wrapper { position: relative; flex: 1; min-width: 200px; }
        .search-wrapper .search-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); color: var(--text-muted); font-size: 0.85rem;
        }
        .paper-search { width: 100%; padding: 9px 16px 9px 40px; }
        .hero-stats-bar {
            display: flex; gap: 20px; justify-content: center;
            margin-top: 16px; font-size: 0.82rem; color: var(--text-muted);
        }
        .hero-stats-bar span { display: flex; align-items: center; gap: 6px; }
        .hero-stats-bar i { color: var(--primary-light); }
        .papers-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .papers-section { margin-bottom: 40px; }
        .papers-section h2 {
            font-size: 1.3rem; font-weight: 600; margin-bottom: 20px;
            padding-bottom: 12px; border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 10px;
        }
        /* glass-card-enhanced */
        .glass-card-enhanced {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            border-radius: var(--radius-xl); padding: 28px;
        }
        .neural-gradient { background: linear-gradient(135deg, rgba(99,102,241,0.06) 0%, rgba(139,92,246,0.06) 100%); }
        .neural-icon { color: var(--primary-light); }
        .adaptive-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .organic-radius { border-radius: var(--radius-lg); }
        .sustainable-responsive { transition: all 0.3s var(--ease-smooth); }
        /* 精选角标 */
        .featured-card { position: relative; }
        .featured-card::after {
            content: '⭐ 精选'; position: absolute; top: 12px; right: 12px;
            padding: 3px 10px; background: var(--gradient-warm);
            border-radius: var(--radius-full); font-size: 0.68rem;
            font-weight: 700; color: white; letter-spacing: 0.05em;
        }
        .featured-card .featured-glow {
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(99,102,241,0.06) 0%, transparent 50%);
            pointer-events: none; animation: featured-glow-pulse 4s ease-in-out infinite;
        }
        @keyframes featured-glow-pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        /* 论文卡片 */
        .paper-card { position: relative; }
        .paper-card .glow-bar {
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent 0%, var(--accent-cyan) 30%, var(--accent-purple) 70%, transparent 100%);
            background-size: 200% 100%; opacity: 0;
            transition: opacity 0.3s, background-position 0.6s; background-position: 100% 0;
        }
        .paper-card:hover .glow-bar { opacity: 1; background-position: 0% 0; }
        .paper-card .hover-progress-bar {
            position: absolute; bottom: 0; left: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
            width: 0%; transition: width 0.5s var(--ease-smooth);
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }
        .paper-card:hover .hover-progress-bar { animation: hover-progress 0.6s var(--ease-smooth) forwards; }
        @keyframes hover-progress { from { width: 0%; } to { width: 100%; } }
        .paper-card::after {
            content: ''; position: absolute; inset: 0; border-radius: inherit;
            background: linear-gradient(135deg, rgba(99,102,241,0.05), rgba(167,139,250,0.03));
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .paper-card:hover::after { opacity: 1; }
        /* 标题下划线动画 */
        .paper-card h3 a {
            background: linear-gradient(var(--text-primary), var(--text-primary)) no-repeat;
            background-size: 0% 1px; background-position: 0 100%;
            transition: background-size var(--duration-base) var(--ease-smooth);
        }
        .paper-card:hover h3 a { background-size: 100% 1px; }
        .paper-card h3:hover { color: var(--accent-cyan); }
        /* 标签 */
        .paper-card .tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: var(--radius-full);
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
            text-transform: uppercase; margin-bottom: 14px;
            transition: transform 0.25s var(--ease-spring);
        }
        .paper-card:hover .tag { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .paper-card .tag.ai     { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.25); }
        .paper-card .tag.edu    { background: rgba(244,114,182,0.15); color: #f472b6; border: 1px solid rgba(244,114,182,0.25); }
        .paper-card .tag.health { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
        /* 引用徽章 */
        .citation-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 10px; background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.2); border-radius: var(--radius-full);
            font-size: 0.7rem; font-weight: 600; color: var(--primary-light);
        }
        /* 难度指示器 */
        .diff-indicator { display: inline-flex; gap: 3px; align-items: center; }
        .diff-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--glass-border); transition: background 0.3s; }
        .diff-indicator .dot.filled { background: var(--primary); box-shadow: 0 0 6px rgba(99,102,241,0.5); }
        .diff-indicator[data-diff="easy"] .dot.filled   { background: var(--accent-green); box-shadow: 0 0 6px rgba(52,211,153,0.5); }
        .diff-indicator[data-diff="medium"] .dot.filled  { background: var(--accent); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
        .diff-indicator[data-diff="hard"] .dot.filled    { background: var(--danger); box-shadow: 0 0 6px rgba(239,68,68,0.5); }
        /* 阅读时间 */
        .read-time { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--text-muted); padding: 2px 8px; background: var(--bg-glass); border-radius: var(--radius-full); }
        /* 论文操作按钮 */
        .paper-card .actions { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
        .paper-card .btn { padding: 7px 16px; border-radius: var(--radius-sm); font-size: 0.82rem; font-weight: 500; cursor: pointer; border: none; transition: all var(--duration-fast) var(--ease-smooth); }
        .paper-card .btn-primary { background: var(--gradient-primary); color: white; }
        .paper-card .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
        .paper-card .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--glass-border); }
        .paper-card .btn-ghost:hover { color: var(--text-primary); border-color: var(--glass-border-hover); background: var(--bg-glass); }
        .paper-card .btn-ghost.saved { color: var(--accent); border-color: var(--accent); }
        /* 链接 */
        .paper-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent-cyan); font-size: 0.88rem; font-weight: 500; transition: gap var(--duration-base); }
        .paper-card:hover .paper-link { gap: 10px; }
        /* 元信息 */
        .paper-card .meta { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; }
        .paper-card .summary { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.65; margin-bottom: 8px; }
        /* 分类染色 */
        .paper-card[data-category="ai"]:hover    { border-color: rgba(99,102,241,0.4); box-shadow: 0 8px 24px rgba(99,102,241,0.15); }
        .paper-card[data-category="edu"]:hover  { border-color: rgba(244,114,182,0.4); box-shadow: 0 8px 24px rgba(244,114,182,0.15); }
        .paper-card[data-category="health"]:hover { border-color: rgba(52,211,153,0.4); box-shadow: 0 8px 24px rgba(52,211,153,0.15); }
        /* 选中状态 */
        .paper-card.selected { border-color: rgba(99,102,241,0.5) !important; background: rgba(99,102,241,0.08) !important; }
        /* 筛选器 */
        .filter-chip.active { background: var(--gradient-primary) !important; border-color: transparent !important; color: white !important; }
        /* 徽章 */
        .badge-hot {
            display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px;
            background: rgba(245,158,11,0.15); color: var(--accent);
            border: 1px solid rgba(245,158,11,0.3); border-radius: var(--radius-full);
            font-size: 0.65rem; font-weight: 600; letter-spacing: 0.06em;
        }
        .badge-hot::before { content: '🔥'; font-size: 0.7rem; }
        /* 响应式 */
        @media (max-width: 768px) {
            .papers-toolbar-new { flex-direction: column; align-items: stretch; }
            .filter-chips { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
            .papers-list { grid-template-columns: 1fr; }
            .hero-stats-bar { gap: 12px; font-size: 0.75rem; }
        }
    </style>
</body>
</html>
